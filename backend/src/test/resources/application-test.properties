# Test profile properties - use in-memory H2 and disable Flyway for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use Hibernate to create/drop schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway during unit tests to avoid duplicate DDL
spring.flyway.enabled=false

# Redis (not required for most unit tests) - leave defaults
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
