# Production Configuration - PostgreSQL + Connection Pooling
# Use with: --spring.config.location=application-prod.properties

# Database Configuration (Production)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/roadguardian}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:your_password}

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# Server Configuration
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000

# Session Configuration
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Health Check & Monitoring (for Kubernetes/Load Balancers)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

# Disable Redis health check in this deployment to avoid treating an optional
# cache dependency as blocking the overall health endpoint.
management.health.redis.enabled=false

# Metrics Configuration
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=roadguardian

# Logging Configuration
logging.level.root=INFO
logging.level.com.roadguardian=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Performance & Security
server.compression.enabled=true
server.compression.min-response-size=1024
server.http2.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
